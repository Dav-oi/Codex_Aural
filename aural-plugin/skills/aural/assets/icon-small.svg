<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A594F9" />
      <stop offset="40%" stop-color="#6246EA" />
      <stop offset="100%" stop-color="#0018CC" />
    </linearGradient>
  </defs>

  <!-- Perfect circle -->
  <circle cx="100" cy="100" r="70" fill="url(#circleGrad)" />

  <!-- Play triangle -->
  <path d="M 72 74 L 90 96 L 72 118"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Equalizer bars -->
  <g fill="#FFFFFF">
    <rect x="108" y="88" width="7" height="12" rx="3.5" />
    <rect x="120" y="80" width="7" height="28" rx="3.5" />
    <rect x="132" y="74" width="7" height="40" rx="3.5" />
    <rect x="144" y="90" width="7" height="8"  rx="3.5" />
  </g>
</svg>
