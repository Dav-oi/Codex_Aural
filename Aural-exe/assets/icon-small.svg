<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A594F9" />
      <stop offset="40%" stop-color="#6246EA" />
      <stop offset="100%" stop-color="#0018CC" />
    </linearGradient>
  </defs>

  <!-- Perfect circle -->
  <circle cx="100" cy="100" r="70" fill="url(#circleGrad)" />

  <!-- Play triangle + Equalizer bars — centered as one group -->
  <!-- Group bounding box: x[61,140] y[78,122], center at (100.5, 100) -->
  
  <!-- Play triangle -->
  <path d="M 61 78 L 79 100 L 61 122"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Equalizer bars -->
  <g fill="#FFFFFF">
    <rect x="97"  y="92" width="7" height="12" rx="3.5" />
    <rect x="109" y="84" width="7" height="28" rx="3.5" />
    <rect x="121" y="78" width="7" height="40" rx="3.5" />
    <rect x="133" y="94" width="7" height="8"  rx="3.5" />
  </g>
</svg>
